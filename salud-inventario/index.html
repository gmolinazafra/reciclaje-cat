<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Análisis de salud del inventario</title>
  <style>
    :root {
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f6f5;
      color: #17201b;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 28px;
    }

    main {
      width: min(1120px, 100%);
      margin: 0 auto;
    }

    header {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: end;
      margin-bottom: 20px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .brand img {
      width: 118px;
      height: auto;
      display: block;
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 5vw, 54px);
      line-height: 1;
      letter-spacing: 0;
    }

    .status {
      margin: 10px 0 0;
      color: #647067;
      font-size: 15px;
    }

    .file {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0 18px;
      border-radius: 8px;
      background: #173d2a;
      color: #fff;
      font-weight: 800;
      cursor: pointer;
      white-space: nowrap;
    }

    .file input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .kpi {
      background: #ffffff;
      border: 1px solid #dfe6e1;
      border-radius: 8px;
      padding: 22px;
      min-height: 128px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      box-shadow: 0 12px 30px rgba(23, 32, 27, .06);
    }

    .label {
      color: #59645d;
      font-size: 15px;
      line-height: 1.3;
    }

    .value {
      margin-top: 18px;
      font-size: clamp(34px, 5vw, 56px);
      line-height: .95;
      font-weight: 800;
      letter-spacing: 0;
    }

    .total {
      background: #173d2a;
      color: #fff;
      border-color: #173d2a;
    }

    .total .label {
      color: #d6eadf;
    }

    @media (max-width: 820px) {
      header {
        align-items: start;
        flex-direction: column;
      }

      .brand {
        align-items: flex-start;
        flex-direction: column;
      }

      .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 560px) {
      body {
        padding: 18px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .kpi {
        min-height: 112px;
      }

      .file {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div class="brand">
        <img src="../assets/logoreddesguaces.png" alt="RedDesguace">
        <div>
          <h1>Análisis de salud del inventario</h1>
          <p class="status" id="status">Carga el CSV de CRVNET para ver los KPIs.</p>
        </div>
      </div>

      <label class="file">
        Cargar CSV
        <input id="csv-file" type="file" accept=".csv,text/csv">
      </label>
    </header>

    <section class="grid" id="grid" aria-live="polite"></section>
  </main>

  <script>
    const labels = [
      ["total", "Piezas totales", "total"],
      ["conFotos", "Piezas con al menos una foto"],
      ["conFotosPrecioYReferencia", "Con fotos, precio y alguna referencia"],
      ["sinFotos", "Piezas sin fotos"],
      ["sinPrecio", "Piezas sin precio"],
      ["sinFotosYPrecioCero", "Sin fotos y precio 0"]
    ];

    const emptyKpis = {
      total: 0,
      conFotos: 0,
      conFotosPrecioYReferencia: 0,
      sinFotos: 0,
      sinPrecio: 0,
      sinFotosYPrecioCero: 0
    };

    const format = new Intl.NumberFormat("es-ES");

    function render(kpis) {
      document.getElementById("grid").innerHTML = labels.map(([key, label, type]) => `
        <article class="kpi ${type || ""}">
          <div class="label">${label}</div>
          <div class="value">${format.format(kpis[key] || 0)}</div>
        </article>
      `).join("");
    }

    function stripBOM(text) {
      return text.charCodeAt(0) === 0xfeff ? text.slice(1) : text;
    }

    function parseCSV(text, sep = ";") {
      const rows = [];
      let row = [];
      let field = "";
      let inQ = false;

      for (let i = 0; i < text.length; i++) {
        const c = text[i];
        const n = text[i + 1];

        if (inQ) {
          if (c === '"' && n === '"') {
            field += '"';
            i++;
          } else if (c === '"') {
            inQ = false;
          } else {
            field += c;
          }
          continue;
        }

        if (c === '"') inQ = true;
        else if (c === sep) {
          row.push(field);
          field = "";
        } else if (c === "\n") {
          row.push(field);
          rows.push(row);
          row = [];
          field = "";
        } else if (c !== "\r") {
          field += c;
        }
      }

      if (field !== "" || row.length) {
        row.push(field);
        rows.push(row);
      }

      if (!rows.length) return { header: [], rows: [] };
      return { header: rows.shift().map(h => h.trim().toLowerCase()), rows };
    }

    function toPrice(value) {
      const s = String(value || "").trim().replace(/\./g, "").replace(",", ".");
      const n = parseFloat(s);
      return Number.isFinite(n) ? Math.round(n * 100) / 100 : 0;
    }

    function hasPhotos(value) {
      return String(value || "")
        .split(",")
        .map(s => s.trim())
        .some(s => /^https?:\/\//i.test(s));
    }

    function calculate(text) {
      const { header, rows } = parseCSV(stripBOM(text));
      const col = Object.fromEntries(header.map((h, i) => [h, i]));

      for (const name of ["refid", "imgs", "precio", "refcatalogo", "refvisual"]) {
        if (!(name in col)) {
          throw new Error(`Falta la columna '${name}' en el CSV.`);
        }
      }

      const kpis = { ...emptyKpis };

      for (const row of rows) {
        const refid = String(row[col.refid] || "").trim();
        if (!refid) continue;

        const fotos = hasPhotos(row[col.imgs]);
        const precio = toPrice(row[col.precio]);
        const refcatalogo = String(row[col.refcatalogo] || "").trim();
        const refvisual = String(row[col.refvisual] || "").trim();
        const tieneReferencia = Boolean(refcatalogo || refvisual);

        kpis.total++;

        if (fotos) kpis.conFotos++;
        else kpis.sinFotos++;

        if (precio <= 0) kpis.sinPrecio++;
        if (!fotos && precio === 0) kpis.sinFotosYPrecioCero++;
        if (fotos && precio > 0 && tieneReferencia) kpis.conFotosPrecioYReferencia++;
      }

      return kpis;
    }

    render(emptyKpis);

    document.getElementById("csv-file").addEventListener("change", event => {
      const file = event.target.files && event.target.files[0];
      if (!file) return;

      const status = document.getElementById("status");
      status.textContent = `Leyendo ${file.name}...`;

      const reader = new FileReader();

      reader.onload = () => {
        try {
          const kpis = calculate(String(reader.result || ""));
          render(kpis);
          status.textContent = `CSV cargado: ${file.name}`;
        } catch (error) {
          status.textContent = error.message;
          render(emptyKpis);
        }
      };

      reader.onerror = () => {
        status.textContent = "No se pudo leer el CSV.";
        render(emptyKpis);
      };

      reader.readAsText(file, "utf-8");
    });
  </script>
</body>
</html>
